          const allComplete = completedModules.length === modules.length;

          return (
            <div className="p-4 md:p-8 flex flex-col h-full overflow-y-auto">
              <div className="mb-6 md:mb-8 text-center shrink-0">
                <h2 className="text-2xl md:text-3xl font-bold text-slate-800">Welcome, {playerName || 'Musician'}!</h2>
                <p className="text-md md:text-lg text-slate-600 mt-2">Select a mission below. Complete them all to unlock your prize.</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 max-w-4xl mx-auto w-full flex-grow">
                {modules.map((mod) => {
                  const isComplete = completedModules.includes(mod.id);
                  const Icon = mod.icon;
                  
                  return (
                    <button
                      key={mod.id}
                      onClick={() => onSelectModule(mod.id)}
                      className={`relative flex flex-col items-center justify-center p-6 md:p-8 rounded-2xl border-4 transition-all transform hover:-translate-y-1 ${
                        isComplete 
                          ? 'bg-slate-100 border-slate-200 opacity-80' 
                          : `${mod.color} ${mod.hover} border-transparent text-white shadow-xl hover:shadow-2xl`
                      }`}
                    >
                      {isComplete && (
                        <div className="absolute top-4 right-4 bg-green-500 rounded-full p-1">
                          <CheckCircle className="w-6 h-6 md:w-8 md:h-8 text-white" />
                        </div>
                      )}
                      <Icon className={`w-12 h-12 md:w-16 md:h-16 mb-4 ${isComplete ? 'text-slate-400' : 'text-white'}`} />
                      <h3 className={`text-xl md:text-2xl font-bold ${isComplete ? 'text-slate-500' : 'text-white'}`}>
                        {mod.title}
                      </h3>
                      <p className={`mt-2 font-medium text-sm md:text-base ${isComplete ? 'text-slate-400' : 'text-white/80'}`}>
                        {isComplete ? 'Mission Complete!' : 'Start Mission'}
                      </p>
                    </button>
                  );
                })}
              </div>

              {allComplete && (
                <div className="mt-8 flex justify-center animate-bounce shrink-0 pb-8">
                  <button 
                    onClick={onGetCertificate}
                    className="py-4 px-8 md:px-12 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-xl md:text-2xl font-bold rounded-xl shadow-xl flex items-center gap-3 border-4 border-yellow-500"
                  >
                    <Award className="w-8 h-8" /> Claim Your Certificate!
                  </button>
                </div>
              )}
            </div>
          );
        }

        function ModuleScreen({ moduleId, onComplete, onBack }) {
          const data = moduleData[moduleId];
          const [step, setStep] = useState(0); 
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showFeedback, setShowFeedback] = useState(false);
          const [isCorrect, setIsCorrect] = useState(false);
          const [expandedComposer, setExpandedComposer] = useState(null);
          const [zoomedImage, setZoomedImage] = useState(null); 

          const handleImageError = (e) => {
            e.target.onerror = null; 
            e.target.src = `https://ui-avatars.com/api/?name=Music+Photo&background=e2e8f0&color=64748b&size=400`;
          };

          const handleAnswer = (index) => {
            if (showFeedback) return;
            
            setSelectedAnswer(index);
            const correct = index === data.questions[step - 1].answer;
            setIsCorrect(correct);
            setShowFeedback(true);

            setTimeout(() => {
              setShowFeedback(false);
              setSelectedAnswer(null);
              if (correct) {
                if (step < data.questions.length) {
                  setStep(step + 1);
                } else {
                  onComplete();
                }
              }
            }, 2000);
          };

          const renderLearnContent = () => {
            switch (moduleId) {
              case 'leaders':
                return (
                  <div className="space-y-6">
                    <h3 className="text-2xl font-bold text-center text-slate-800 mb-6">Meet Your Orchestra Leaders</h3>
                    
                    {data.leadersList.map((leader, i) => (
                      <div key={i} className="bg-white rounded-2xl shadow-md border-2 border-purple-100 overflow-hidden flex flex-col md:flex-row">
                        <div className="md:w-1/3 bg-purple-200 flex items-center justify-center p-6 shrink-0 relative group">
                          <img 
                            src={`${GITHUB_BASE_URL}/${leader.imageName}`} 
                            onError={handleImageError}
                            onClick={(e) => { e.stopPropagation(); setZoomedImage(`${GITHUB_BASE_URL}/${leader.imageName}`); }}
                            alt={leader.name} 
                            className="w-32 h-32 rounded-full border-4 border-white shadow-lg object-cover cursor-pointer group-hover:opacity-80 transition-opacity" 
                          />
                          <div className="absolute bottom-4 right-4 bg-purple-900 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                            <ZoomIn className="w-5 h-5" />
                          </div>
                        </div>
                        <div className="p-6 md:w-2/3 max-h-80 overflow-y-auto">
                          <h4 className="text-2xl font-bold text-purple-900">{leader.name}</h4>
                          <p className="text-purple-600 font-bold mb-3 uppercase tracking-wider text-sm">{leader.title}</p>
                          <p className="text-slate-700 text-sm mb-4 whitespace-pre-wrap">{leader.bio}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                );

              case 'families':
                return (
                  <div className="space-y-6">
                    <h3 className="text-2xl font-bold text-center text-slate-800 mb-4">The Orchestra Diagram</h3>
                    
                    <div className="bg-slate-100 p-2 rounded-2xl shadow-inner text-center border-4 border-slate-300 relative group cursor-pointer" onClick={() => setZoomedImage(`${GITHUB_BASE_URL}/${data.diagramName}`)}>
                      <img 
                          src={`${GITHUB_BASE_URL}/${data.diagramName}`} 
                          onError={handleImageError}
                          alt="Orchestra Diagram" 
                          className="w-full h-auto rounded-xl shadow-sm group-hover:opacity-90 transition-opacity" 
                      />
                      <div className="absolute bottom-4 right-4 bg-slate-800 text-white px-3 py-2 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-2">
                        <ZoomIn className="w-5 h-5" /> Click to Enlarge
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                       <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                         <h4 className="font-bold text-blue-800 text-lg">🎻 Strings</h4>
                         <p className="text-sm text-slate-700 mt-1">Played by bowing or plucking. Includes Violin, Viola, Cello, Double Bass, and Harp.</p>
                       </div>
                       <div className="bg-teal-50 border-l-4 border-teal-500 p-4 rounded-r-lg">
                         <h4 className="font-bold text-teal-800 text-lg">🎷 Woodwinds</h4>
                         <p className="text-sm text-slate-700 mt-1">Played using air, often with a wooden "reed". Includes Flute, Clarinet, Oboe, and Bassoon.</p>
                       </div>
                       <div className="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg">
                         <h4 className="font-bold text-amber-800 text-lg">🎺 Brass</h4>
                         <p className="text-sm text-slate-700 mt-1">Metal tubes! Played by buzzing lips into a mouthpiece. Includes Trumpet, Trombone, Horn, Tuba.</p>
                       </div>
                       <div className="bg-orange-50 border-l-4 border-orange-500 p-4 rounded-r-lg">
                         <h4 className="font-bold text-orange-800 text-lg">🥁 Percussion</h4>
                         <p className="text-sm text-slate-700 mt-1">Anything you hit, shake, or scrape! Includes Timpani, Snare Drum, Triangle, Xylophone.</p>
                       </div>
                    </div>
                  </div>
                );

              case 'composers':
                return (
                  <div className="space-y-4">
                    <h3 className="text-2xl font-bold text-center text-slate-800 mb-6">The Composer Passport</h3>
                    <p className="text-center text-slate-600 mb-4">Click a composer to expand, read their history, and hear their music!</p>
                    
                    {data.composers.map((composer, idx) => (
                      <div key={idx} className="border-2 border-green-200 rounded-xl overflow-hidden bg-white shadow-sm transition-all duration-300">
                        <button 
                          onClick={() => setExpandedComposer(expandedComposer === idx ? null : idx)}
                          className="w-full flex items-center justify-between p-4 bg-green-50 hover:bg-green-100 transition-colors"
                        >
                          <div className="flex items-center gap-4 text-left">
                            <img 
                              src={`${GITHUB_BASE_URL}/${composer.imageName}`} 
                              onError={handleImageError}
                              onClick={(e) => { e.stopPropagation(); setZoomedImage(`${GITHUB_BASE_URL}/${composer.imageName}`); }}
                              alt={composer.name} 
                              className="w-12 h-12 rounded-full object-cover border-2 border-green-400 shadow-sm cursor-pointer hover:scale-110 transition-transform" 
                              title="Click to Enlarge Photo"
                            />
                            <div className="text-left">
                              <h4 className="font-bold text-green-900 text-lg">{composer.name}</h4>
                              <p className="text-sm text-green-700 italic">{composer.piece}</p>
                            </div>
                          </div>
                          {expandedComposer === idx ? <ChevronUp className="text-green-700 shrink-0" /> : <ChevronDown className="text-green-700 shrink-0" />}
                        </button>
                        
                        {expandedComposer === idx && (
                          <div className="p-6 bg-white border-t border-green-100 animate-fadeIn">
                            <div className="flex gap-3 mb-4">
                              <Info className="w-5 h-5 text-blue-500 shrink-0 mt-1" />
                              <div className="max-h-48 overflow-y-auto pr-2">
                                <p className="text-slate-700 text-sm leading-relaxed">{composer.bio}</p>
                              </div>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg">
                              <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2">
                                <Music className="w-4 h-4 text-green-600" /> 
                                Elements to Listen For:
                              </h5>
                              <ul className="list-disc pl-5 space-y-1 text-sm text-slate-700">
                                {composer.elements.map((el, i) => (
                                  <li key={i}>{el}</li>
                                ))}
                              </ul>
                              
                              <AudioSnippet src={composer.youtubeQuery} />
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                );

              case 'etiquette':
                return (
                  <div className="space-y-6">
                    <h3 className="text-2xl font-bold text-center text-slate-800 mb-6">Concert Survival Guide</h3>
                    
                    {data.sections.map((section, idx) => {
                      const IconComponent = {
                        MapPin: MapPin,
                        Music: Music,
                        Users: Users,
                        Star: Star,
                        Award: Award
                      }[section.icon] || Star;

                      return (
                        <div key={idx} className="bg-orange-50 border-l-8 border-orange-500 p-6 rounded-r-2xl shadow-sm">
                          <h4 className="text-xl font-bold text-orange-900 mb-2 flex items-center gap-2">
                            <IconComponent className="w-6 h-6" /> {idx + 1}. {section.title}
                          </h4>
                          <p className="text-slate-700">{section.content}</p>
                        </div>
                      );
                    })}
                  </div>
                );

              default:
                return null;
            }
          };

          return (
            <div className="flex flex-col h-full bg-white relative">
              <ImageModal src={zoomedImage} onClose={() => setZoomedImage(null)} />

              <div className="flex items-center p-3 md:p-4 border-b border-slate-100 shrink-0 z-10 bg-white">
                <button onClick={onBack} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                  <ArrowLeft className="w-6 h-6" />
                </button>
                <h2 className={`text-xl md:text-2xl font-bold ml-2 md:ml-4 ${data.color}`}>{data.title}</h2>
                <div className="ml-auto flex gap-1 md:gap-2">
                  <div className={`w-2 h-2 md:w-3 md:h-3 rounded-full ${step === 0 ? data.color.replace('text', 'bg') : 'bg-slate-200'}`}></div>
                  {data.questions.map((_, idx) => (
                     <div key={idx} className={`w-2 h-2 md:w-3 md:h-3 rounded-full ${step === idx + 1 ? data.color.replace('text', 'bg') : 'bg-slate-200'}`}></div>
                  ))}
                </div>
              </div>

              <div className="flex-grow p-4 md:p-8 flex flex-col items-center overflow-y-auto bg-slate-50">
                {step === 0 ? (
                  <div className="max-w-3xl w-full flex flex-col h-full">
                    <div className={`flex-grow bg-white p-4 md:p-8 rounded-2xl shadow-sm border border-slate-200`}>
                      {renderLearnContent()}
                    </div>
                    
                    <button 
                      onClick={() => setStep(1)}
                      className={`w-full py-4 mt-6 shrink-0 ${data.color.replace('text-', 'bg-')} hover:brightness-110 text-white text-xl md:text-2xl font-bold rounded-xl shadow-md transform transition active:scale-95 flex justify-center items-center gap-2`}
                    >
                      Start Quiz <ArrowRight className="w-6 h-6" />
                    </button>
                  </div>
                ) : (
                  <div className="max-w-2xl w-full flex flex-col justify-center h-full my-auto">
                    <h3 className="text-2xl md:text-3xl font-bold text-slate-800 text-center mb-8 md:mb-12 leading-tight">
                      {data.questions[step - 1].q}
                    </h3>
                    
                    <div className="space-y-4">
                      {data.questions[step - 1].options.map((opt, idx) => {
                        let btnStyle = "bg-white border-2 border-slate-200 hover:border-slate-400 hover:bg-slate-50 text-slate-700";
                        
                        if (showFeedback && selectedAnswer === idx) {
                          btnStyle = isCorrect 
                            ? "bg-green-500 border-green-600 text-white scale-105 shadow-lg" 
                            : "bg-red-500 border-red-600 text-white animate-shake";
                        } else if (showFeedback && idx === data.questions[step - 1].answer) {
                          btnStyle = "bg-green-100 border-green-500 text-green-800";
                        }

                        return (
                          <button
                            key={idx}
                            onClick={() => handleAnswer(idx)}
                            disabled={showFeedback}
                            className={`w-full p-4 md:p-6 text-lg md:text-xl font-semibold rounded-xl transition-all duration-300 text-left ${btnStyle}`}
                          >
                            {opt}
                          </button>
                        );
                      })}
                    </div>

                    {showFeedback && (
                      <div className={`mt-8 text-center text-xl md:text-2xl font-bold animate-bounce ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                        {isCorrect ? "⭐ Brilliant! You got it!" : "Oops! Read carefully and try again!"}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          );
        }

        function CertificateScreen({ playerName, onRestart }) {
          return (
            <div className="flex-grow flex flex-col items-center justify-center p-4 md:p-8 bg-gradient-to-br from-yellow-50 via-white to-orange-50 relative overflow-y-auto">
              <Star className="absolute top-10 left-10 w-16 h-16 text-yellow-300 fill-yellow-200 opacity-50" />
              <Star className="absolute bottom-20 right-10 w-24 h-24 text-orange-300 fill-orange-200 opacity-50" />
              <Music className="absolute top-20 right-20 w-12 h-12 text-blue-300 opacity-30" />
              
              <div className="border-[8px] md:border-[12px] border-double border-indigo-900 bg-white p-6 md:p-16 rounded-lg max-w-3xl w-full text-center shadow-2xl relative z-10 mt-8">
                <Award className="w-16 h-16 md:w-24 md:h-24 text-yellow-500 mx-auto mb-4 md:mb-6" />
                <h2 className="text-lg md:text-2xl font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Official Certificate of Mastery</h2>
                <h1 className="text-3xl md:text-6xl font-extrabold text-indigo-900 mb-6 md:mb-8 font-serif italic break-words">
                  {playerName || "Musician"}
                </h1>
                <p className="text-md md:text-2xl text-slate-700 leading-relaxed max-w-xl mx-auto mb-8 md:mb-10">
                  Has successfully completed the Symphony Quest and is officially prepared for the <span className="font-bold text-indigo-900">OKC Philharmonic Dances Around the World Concert</span>.
                </p>
                
                <div className="flex flex-col md:flex-row justify-center items-center md:items-end gap-8 md:gap-16 mt-8">
                  <div className="border-t-2 border-slate-400 pt-2 w-48 order-2 md:order-1">
                    <p className="font-bold text-slate-800">Luca Antonucci</p>
                    <p className="text-sm text-slate-500">Maestro / Conductor</p>
                  </div>
                  <div className="w-20 h-20 md:w-24 md:h-24 bg-red-100 rounded-full border-4 border-red-500 flex items-center justify-center transform md:-rotate-12 shadow-md order-1 md:order-2">
                    <span className="text-red-600 font-bold text-xs md:text-sm tracking-wider uppercase">Official<br/>Seal</span>
                  </div>
                </div>
              </div>

              <button 
                onClick={onRestart}
                className="mt-8 md:mt-12 text-indigo-600 font-bold hover:underline hover:text-indigo-800 pb-8"
              >
                Start Over for Next Student
              </button>
            </div>
          );
        }

        // === MAIN APP COMPONENT ===
        function App() {
          const [currentScreen, setCurrentScreen] = useState('home'); 
          const [activeModule, setActiveModule] = useState(null);
          const [completedModules, setCompletedModules] = useState([]);
          const [playerName, setPlayerName] = useState('');

          const modules = [
            { id: 'leaders', title: 'The Leaders', icon: Users, color: 'bg-purple-500', hover: 'hover:bg-purple-600' },
            { id: 'families', title: 'Instrument Families', icon: Music, color: 'bg-blue-500', hover: 'hover:bg-blue-600' },
            { id: 'composers', title: 'World Tour', icon: Globe, color: 'bg-green-500', hover: 'hover:bg-green-600' },
            { id: 'etiquette', title: 'Manners & Rules', icon: BookOpen, color: 'bg-orange-500', hover: 'hover:bg-orange-600' }
          ];

          const handleModuleComplete = (id) => {
            if (!completedModules.includes(id)) {
              setCompletedModules([...completedModules, id]);
            }
            setCurrentScreen('dashboard');
            setActiveModule(null);
          };

          const renderScreen = () => {
            switch (currentScreen) {
              case 'home':
                return <HomeScreen onStart={(name) => { setPlayerName(name); setCurrentScreen('dashboard'); }} />;
              case 'dashboard':
                return (
                  <Dashboard 
                    playerName={playerName}
                    modules={modules} 
                    completedModules={completedModules} 
                    onSelectModule={(id) => { setActiveModule(id); setCurrentScreen('module'); }}
                    onGetCertificate={() => setCurrentScreen('certificate')}
                  />
                );
              case 'module':
                return <ModuleScreen moduleId={activeModule} onComplete={() => handleModuleComplete(activeModule)} onBack={() => setCurrentScreen('dashboard')} />;
              case 'certificate':
                return <CertificateScreen playerName={playerName} onRestart={() => { setCompletedModules([]); setCurrentScreen('home'); setPlayerName(''); }} />;
              default:
                return <HomeScreen />;
            }
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-2 md:p-8 flex justify-center items-center">
              <div className="max-w-5xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-slate-200 h-[90vh] flex flex-col">
                <div className="bg-indigo-900 text-white p-4 md:p-6 flex items-center justify-between shrink-0 z-20 shadow-md">
                  <div className="flex items-center gap-3">
                    <Music className="w-6 h-6 md:w-8 md:h-8 text-yellow-400" />
                    <h1 className="text-xl md:text-3xl font-bold tracking-wider">SYMPHONY QUEST</h1>
                  </div>
                  {currentScreen !== 'home' && currentScreen !== 'certificate' && (
                    <div className="flex items-center gap-2 bg-indigo-800 px-3 py-1 md:px-4 md:py-2 rounded-full border border-indigo-700">
                      <Star className="w-4 h-4 md:w-5 md:h-5 text-yellow-400 fill-yellow-400" />
                      <span className="font-bold text-sm md:text-lg">{completedModules.length} / 4</span>
                    </div>
                  )}
                </div>
                
                <div className="flex-grow flex flex-col relative overflow-hidden bg-slate-50">
                  {renderScreen()}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
